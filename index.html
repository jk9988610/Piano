<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="piano-app-version" content="0.4.12" />
    <title>钢琴工作室 · Piano Studio</title>
    <link rel="preload" href="js/tone.min.js?v=0.4.12" as="script" />
    <link rel="modulepreload" href="js/piano/piano-studio.js?v=0.4.12" />
    <link rel="stylesheet" href="css/piano-studio.css?v=0.4.12" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="app-header">
        <h1 class="app-title" data-i18n="app.title">钢琴工作室</h1>
        <span id="versionBadge" class="version-badge">v0.4.12</span>
        <div class="file-actions">
          <button type="button" id="btnNew" class="btn btn-ghost" data-i18n="file.new">新建</button>
          <button type="button" id="btnOpen" class="btn btn-ghost" data-i18n="file.open">打开</button>
          <button type="button" id="btnSave" class="btn btn-ghost" data-i18n="file.save">保存</button>
        </div>
        <div class="header-actions">
          <button type="button" id="btnFullscreen" class="btn btn-icon" title="全屏" aria-label="全屏">⛶</button>
          <span id="statusText" class="status-text" data-i18n="status.ready">就绪</span>
        </div>
      </header>

      <section class="transport-bar">
        <button type="button" id="btnRecord" class="btn btn-record" data-i18n="transport.record">● 录制</button>
        <button type="button" id="btnStopRec" class="btn" disabled data-i18n="transport.stop">■ 停止</button>
        <button type="button" id="btnPlayMode" class="btn btn-mode">欣赏模式</button>
        <button type="button" id="btnPlay" class="btn btn-play" data-i18n="transport.play">▶ 播放</button>
        <button type="button" id="btnStopPlay" class="btn" disabled data-i18n="transport.stopPlay">⏹ 停止播放</button>
        <button type="button" id="btnOpenScore" class="btn btn-ghost" data-i18n="score.open">♫ 打开乐谱</button>
        <button type="button" id="btnDemoTwinkle" class="btn btn-ghost" data-i18n="score.demo.twinkle">示例：小星星</button>
        <button type="button" id="btnDemoBirthday" class="btn btn-ghost" data-i18n="score.demo.birthday">示例：生日快乐</button>
        <button type="button" id="btnDemoTwoTigers" class="btn btn-ghost" data-i18n="score.demo.twoTigers">示例：两只老虎</button>
        <button type="button" id="btnDemoJasmine" class="btn btn-ghost" data-i18n="score.demo.jasmine">示例：茉莉花</button>
        <span id="timeDisplay" class="time-display">00:00 / 00:00</span>
      </section>

      <section class="keyboard-nav-bar" aria-label="键盘导航">
        <button type="button" id="btnKeyZoomOut" class="btn btn-icon btn-zoom" title="缩小琴键" aria-label="缩小琴键">−</button>
        <div id="keyboardNavTrack" class="keyboard-nav-track">
          <div id="keyboardMiniMap" class="keyboard-nav-minimap"></div>
          <div id="keyboardNavViewport" class="keyboard-nav-viewport"></div>
        </div>
        <button type="button" id="btnKeyZoomIn" class="btn btn-icon btn-zoom" title="放大琴键" aria-label="放大琴键">+</button>
      </section>

      <section id="fallNotesStage" class="fall-notes-stage" aria-hidden="true"></section>

      <main class="keyboard-area">
        <div id="keyboardHost"></div>
      </main>
    </div>

    <input type="file" id="fileInput" accept=".hfproj,application/json" hidden />
    <input type="file" id="scoreFileInput" accept=".json,.hfscore,application/json" hidden />

    <script src="js/tone.min.js?v=0.4.12"></script>
    <script type="module" src="js/piano/piano-studio.js?v=0.4.12"></script>
  </body>
</html>
